<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#080a0d;
color:#dde6f0;
font-family:'Inter',sans-serif;
margin:0;
padding:40px;
max-width:700px;
margin:auto;
}

h1{
font-family:'DM Mono',monospace;
letter-spacing:3px;
font-size:14px;
color:#2dd4a0;
}

input{
width:100%;
padding:16px;
margin-top:10px;
margin-bottom:10px;
background:#11161c;
border:1px solid #1c2330;
border-radius:10px;
color:#fff;
font-size:15px;
}

button{
background:#2dd4a0;
border:none;
padding:14px;
border-radius:10px;
width:100%;
font-family:'DM Mono',monospace;
cursor:pointer;
}

.smallbtn{
margin-top:10px;
background:#1c2330;
color:#fff;
}

.suggestions{
background:#0f1318;
border:1px solid #1c2330;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

.sug{
padding:14px;
border-bottom:1px solid #1c2330;
cursor:pointer;
}

.sug:hover{
background:#141921;
}

.card{
background:#0f1318;
border:1px solid #1c2330;
border-radius:16px;
margin-top:30px;
overflow:hidden;
}

.card-header{
padding:20px;
border-bottom:1px solid #1c2330;
}

.ticker{
font-family:'DM Mono',monospace;
font-size:22px;
}

.price{
font-family:'DM Mono',monospace;
font-size:38px;
margin-top:10px;
}

.change{
margin-top:8px;
font-family:'DM Mono',monospace;
}

.green{color:#2dd4a0}
.red{color:#f87171}

.card-body{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:20px;
font-family:'DM Mono',monospace;
font-size:13px;
}

</style>

</head>

<body>

<h1>MARKET TERMINAL</h1>

<div id="apikeyBox">

<input id="apikey" placeholder="Entrer votre clé Alpha Vantage">

<button onclick="saveKey()">Activer</button>

</div>

<button id="changeKeyBtn" class="smallbtn" onclick="showKeyInput()" style="display:none">
⚙ Modifier la clé API
</button>

<input id="search" placeholder="Rechercher Apple, LVMH, AAPL...">

<div id="suggestions" class="suggestions"></div>
<div id="result"></div>

<script>

let API_KEY = localStorage.getItem("av_key") || "";

// vérifier au chargement
window.onload = function(){

if(API_KEY){

document.getElementById("apikeyBox").style.display="none";

document.getElementById("changeKeyBtn").style.display="block";

}

};

// enregistrer clé
function saveKey(){

API_KEY=document.getElementById("apikey").value.trim();

if(!API_KEY){

alert("Clé API requise");

return;

}

localStorage.setItem("av_key",API_KEY);

document.getElementById("apikeyBox").style.display="none";

document.getElementById("changeKeyBtn").style.display="block";

alert("Clé enregistrée");

}

// afficher champ clé
function showKeyInput(){

document.getElementById("apikeyBox").style.display="block";

document.getElementById("changeKeyBtn").style.display="none";

}

let timer;

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.trim();

clearTimeout(timer);

if(q.length<2){

document.getElementById("suggestions").innerHTML="";

return;

}

timer=setTimeout(()=>search(q),700);

});

async function search(q){

const url=`https://www.alphavantage.co/query?function=SYMBOL_SEARCH&keywords=${encodeURIComponent(q)}&apikey=${API_KEY}`;

const res=await fetch(url);

const data=await res.json();

renderSuggestions(data.bestMatches||[]);

}

function renderSuggestions(list){

const box=document.getElementById("suggestions");

box.innerHTML="";

list.slice(0,6).forEach(s=>{

const symbol=s["1. symbol"];

const name=s["2. name"];

const region=s["4. region"];

const div=document.createElement("div");

div.className="sug";

div.textContent=`${symbol} — ${name} (${region})`;

div.onclick=()=>loadQuote(symbol);

box.appendChild(div);

});

}

async function loadQuote(symbol){

document.getElementById("suggestions").innerHTML="";

const res=await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`);

const data=await res.json();

const d=data["Global Quote"];

if(!d){

document.getElementById("result").innerHTML="Données indisponibles";

return;

}

const change=parseFloat(d["09. change"]);

const color=change>=0?"green":"red";

document.getElementById("result").innerHTML=

`

<div class="card">

<div class="card-header">

<div class="ticker">${d["01. symbol"]}</div>

<div class="price">${d["05. price"]}</div>

<div class="change ${color}">

${d["09. change"]} (${d["10. change percent"]})

</div>

</div>

<div class="card-body">

<div>Open</div><div>${d["02. open"]}</div>

<div>High</div><div>${d["03. high"]}</div>

<div>Low</div><div>${d["04. low"]}</div>

<div>Prev Close</div><div>${d["08. previous close"]}</div>

</div>

</div>

`;

}

</script>

</body>
</html>
