<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Terminal</title>

<style>

body{
background:#0b0f14;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:40px;
max-width:700px;
margin:auto;
}

h1{
font-size:26px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:none;
outline:none;
margin-bottom:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#19c37d;
color:black;
font-weight:bold;
cursor:pointer;
}

.card{
margin-top:30px;
padding:20px;
border-radius:12px;
background:#151b23;
}

.price{
font-size:32px;
margin-top:10px;
}

.green{color:#19c37d}
.red{color:#ff6b6b}

.suggestions{
background:#151b23;
border-radius:10px;
margin-top:5px;
overflow:hidden;
}

.sug{
padding:10px;
cursor:pointer;
border-bottom:1px solid #222;
}

.sug:hover{
background:#1d2632;
}

</style>
</head>

<body>

<h1>Market Terminal</h1>

<div id="setup">

<input
type="password"
id="apiKey"
placeholder="Entrer votre clé API Financial Modeling Prep"
/>

<button onclick="saveKey()">Activer</button>

</div>


<div id="app" style="display:none">

<input
type="text"
id="search"
placeholder="Rechercher Apple, AAPL, LVMH..."
autocomplete="off"
/>

<div id="suggestions" class="suggestions"></div>

<div id="result"></div>

</div>


<script>

let API_KEY = localStorage.getItem("fmp_key") || "";
let debounce;

if(API_KEY){
document.getElementById("setup").style.display="none";
document.getElementById("app").style.display="block";
}

function saveKey(){

const key=document.getElementById("apiKey").value.trim();

if(!key)return;

API_KEY=key;

localStorage.setItem("fmp_key",key);

document.getElementById("setup").style.display="none";
document.getElementById("app").style.display="block";

}


document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.trim();

clearTimeout(debounce);

if(q.length<2){
document.getElementById("suggestions").innerHTML="";
return;
}

debounce=setTimeout(()=>search(q),400);

});


async function search(q){

try{

const url=`https://financialmodelingprep.com/api/v3/search?query=${encodeURIComponent(q)}&limit=7&apikey=${API_KEY}`;

const res=await fetch(url);

const data=await res.json();

renderSuggestions(data);

}catch(e){

console.log(e);

}

}


function renderSuggestions(list){

const box=document.getElementById("suggestions");

box.innerHTML="";

list.forEach(s=>{

const div=document.createElement("div");

div.className="sug";

div.innerHTML=`${s.symbol} — ${s.name}`;

div.onclick=()=>loadQuote(s.symbol);

box.appendChild(div);

});

}


async function loadQuote(symbol){

document.getElementById("suggestions").innerHTML="";

try{

const url=`https://financialmodelingprep.com/api/v3/quote/${symbol}?apikey=${API_KEY}`;

const res=await fetch(url);

const data=await res.json();

const d=data[0];

renderCard(d);

}catch(e){

console.log(e);

}

}


function renderCard(d){

const up=d.change>=0;

const color=up?"green":"red";

document.getElementById("result").innerHTML=

`
<div class="card">

<h2>${d.symbol}</h2>

<div>${d.name||""}</div>

<div class="price ${color}">
${d.price.toFixed(2)} ${d.currency||"USD"}
</div>

<div class="${color}">
${up?"+":""}${d.change.toFixed(2)} (${d.changesPercentage.toFixed(2)}%)
</div>

</div>
`;

}

</script>

</body>
</html>
