<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>

body{
background:#080a0d;
color:#dde6f0;
font-family:'Inter',sans-serif;
margin:0;
padding:40px;
max-width:700px;
margin:auto;
}

h1{
font-family:'DM Mono',monospace;
letter-spacing:3px;
font-size:14px;
color:#2dd4a0;
}

input{
width:100%;
padding:16px;
margin-top:10px;
margin-bottom:10px;
background:#11161c;
border:1px solid #1c2330;
border-radius:10px;
color:#fff;
font-size:15px;
}

button{
background:#2dd4a0;
border:none;
padding:14px;
border-radius:10px;
width:100%;
font-family:'DM Mono',monospace;
cursor:pointer;
}

.smallbtn{
margin-top:10px;
background:#1c2330;
color:#fff;
}

.suggestions{
background:#0f1318;
border:1px solid #1c2330;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

.sug{
padding:14px;
border-bottom:1px solid #1c2330;
cursor:pointer;
}

.sug:hover{
background:#141921;
}

.card{
background:#0f1318;
border:1px solid #1c2330;
border-radius:16px;
margin-top:30px;
overflow:hidden;
}

.card-header{
padding:20px;
border-bottom:1px solid #1c2330;
}

.ticker{
font-family:'DM Mono',monospace;
font-size:22px;
}

.price{
font-family:'DM Mono',monospace;
font-size:42px;
margin-top:10px;
}

.change{
margin-top:8px;
font-family:'DM Mono',monospace;
}

.green{color:#2dd4a0}
.red{color:#f87171}

.news{
padding:20px;
border-top:1px solid #1c2330;
}

.news h3{
font-size:14px;
margin-bottom:10px;
font-family:'DM Mono',monospace;
color:#2dd4a0;
}

.news-item{
margin-bottom:12px;
font-size:13px;
}
</head>

.news-item a{
color:#dde6f0;
text-decoration:none;
}

.news-item a:hover{
text-decoration:underline;
}

.sentiment{
font-size:12px;
opacity:0.7;
}

</style>
</head>
<body>
<h1>MARKET TERMINAL</h1>
<div id="apikeyBox">
<input id="apikey" placeholder="Entrer votre clé Alpha Vantage">
<button onclick="saveKey()">Activer</button>
</div>
<button id="changeKeyBtn" class="smallbtn" onclick="showKeyInput()" style="display:none">
⚙ Modifier la clé API
</button>
<input id="search" placeholder="Rechercher Apple, LVMH, SAP...">
<div id="suggestions" class="suggestions"></div>
<div id="result"></div>
<script>

let API_KEY = localStorage.getItem("av_key") || "";

window.onload=function(){

if(API_KEY){

document.getElementById("apikeyBox").style.display="none";
document.getElementById("changeKeyBtn").style.display="block";

}

};

function saveKey(){

API_KEY=document.getElementById("apikey").value.trim();

if(!API_KEY){
alert("Clé API requise");
return;
}

localStorage.setItem("av_key",API_KEY);

document.getElementById("apikeyBox").style.display="none";
document.getElementById("changeKeyBtn").style.display="block";

alert("Clé enregistrée");

}

function showKeyInput(){

document.getElementById("apikeyBox").style.display="block";
document.getElementById("changeKeyBtn").style.display="none";

}

const tickers=[

{symbol:"AAPL",name:"Apple"},
{symbol:"MSFT",name:"Microsoft"},
{symbol:"NVDA",name:"Nvidia"},
{symbol:"TSLA",name:"Tesla"},
{symbol:"AMZN",name:"Amazon"},
{symbol:"META",name:"Meta"},
{symbol:"GOOGL",name:"Alphabet"},
{symbol:"JPM",name:"JPMorgan"},
{symbol:"V",name:"Visa"},
{symbol:"WMT",name:"Walmart"},
{symbol:"KO",name:"Coca-Cola"},
{symbol:"MCD",name:"McDonald's"},
{symbol:"BA",name:"Boeing"},
{symbol:"CAT",name:"Caterpillar"},
{symbol:"DIS",name:"Disney"},
{symbol:"IBM",name:"IBM"},
{symbol:"INTC",name:"Intel"},
{symbol:"NKE",name:"Nike"},
{symbol:"PG",name:"Procter & Gamble"},
{symbol:"CRM",name:"Salesforce"},
{symbol:"HD",name:"Home Depot"},
{symbol:"MRK",name:"Merck"},
{symbol:"VZ",name:"Verizon"},
{symbol:"AXP",name:"American Express"},
{symbol:"GS",name:"Goldman Sachs"},

{symbol:"MC.PA",name:"LVMH"},
{symbol:"AIR.PA",name:"Airbus"},
{symbol:"OR.PA",name:"L'Oreal"},
{symbol:"TTE.PA",name:"TotalEnergies"},
{symbol:"SAN.PA",name:"Sanofi"},
{symbol:"BNP.PA",name:"BNP Paribas"},
{symbol:"AI.PA",name:"Air Liquide"},
{symbol:"CAP.PA",name:"Capgemini"},
{symbol:"SU.PA",name:"Schneider Electric"},
{symbol:"KER.PA",name:"Kering"},
{symbol:"RMS.PA",name:"Hermes"},
{symbol:"ENGI.PA",name:"Engie"},
{symbol:"HO.PA",name:"Thales"},

{symbol:"SAP.DE",name:"SAP"},
{symbol:"ASML.AS",name:"ASML"},
{symbol:"SIE.DE",name:"Siemens"},
{symbol:"ALV.DE",name:"Allianz"},
{symbol:"ADS.DE",name:"Adidas"},
{symbol:"BAS.DE",name:"BASF"},
{symbol:"BAYN.DE",name:"Bayer"},
{symbol:"IBE.MC",name:"Iberdrola"},
{symbol:"ITX.MC",name:"Inditex"},
{symbol:"ENI.MI",name:"ENI"}

];

document.getElementById("search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

if(q.length<1){

document.getElementById("suggestions").innerHTML="";
return;

}

const results=tickers.filter(t=>

t.symbol.toLowerCase().includes(q)||
t.name.toLowerCase().includes(q)

);

renderSuggestions(results.slice(0,6));

});

function renderSuggestions(list){

const box=document.getElementById("suggestions");

box.innerHTML="";

list.forEach(s=>{

const div=document.createElement("div");

div.className="sug";

div.textContent=`${s.symbol} — ${s.name}`;

div.onclick=()=>loadQuote(s.symbol);

box.appendChild(div);

});

}

async function loadQuote(symbol){

document.getElementById("suggestions").innerHTML="";

const res=await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`);

const data=await res.json();

const d=data["Global Quote"];

if(!d){

document.getElementById("result").innerHTML="Données indisponibles";
return;

}

const change=parseFloat(d["09. change"]);
const color=change>=0?"green":"red";

document.getElementById("result").innerHTML=

`<div class="card">

<div class="card-header">

<div class="ticker">${d["01. symbol"]}</div>

<div class="price">${d["05. price"]}</div>

<div class="change ${color}">
${d["09. change"]} (${d["10. change percent"]})
</div>

</div>

<div class="news" id="news">
<h3>News & Sentiment</h3>
Chargement...
</div>

</div>`;

loadNews(symbol);

}

async function loadNews(symbol){

const res=await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${symbol}&apikey=${API_KEY}`);

const data=await res.json();

const container=document.getElementById("news");

if(!data.feed){

container.innerHTML="<h3>News</h3>Aucune news";
return;

}

container.innerHTML="<h3>News & Sentiment</h3>";

data.feed.slice(0,3).forEach(n=>{

container.innerHTML+=`

<div class="news-item">

<a href="${n.url}" target="_blank">${n.title}</a>

<div class="sentiment">
Sentiment : ${n.overall_sentiment_label}
</div>

</div>`;

});

}

</script>
</body>
</html>
:::
