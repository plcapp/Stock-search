<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Terminal</title>
<style>
body{background:#0b0f14;color:#fff;font-family:Arial,sans-serif;padding:40px;max-width:700px;margin:auto;}
input{width:100%;padding:14px;margin:10px 0;font-size:16px;border-radius:8px;border:none;outline:none;}
button{padding:12px 18px;background:#19c37d;border:none;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;}
.suggestions{background:#141a22;border-radius:10px;overflow:hidden;margin-top:5px;}
.sug{padding:10px;cursor:pointer;border-bottom:1px solid #222;color:#fff;}
.sug:hover{background:#1d2632;}
.card{margin-top:30px;background:#141a22;padding:20px;border-radius:10px;}
</style>
</head>
<body>

<h2>Market Terminal</h2>

<!-- Setup clé API -->
<input type="text" id="apikey" placeholder="Entrer votre clé API FMP"/>
<button onclick="saveKey()">Activer</button>

<!-- Recherche -->
<input type="text" id="search" placeholder="Rechercher Apple, AAPL..."/>
<div id="suggestions" class="suggestions"></div>
<div id="result"></div>

<script>
// Récupérer la clé stockée
let API_KEY = localStorage.getItem("fmp_key") || "";
document.getElementById("apikey").value = API_KEY;

// Enregistrer la clé
function saveKey(){
    API_KEY = document.getElementById("apikey").value.trim();
    if(!API_KEY) { alert("Clé API requise"); return; }
    localStorage.setItem("fmp_key", API_KEY);
    alert("Clé enregistrée");
}

// Debounce pour limiter les appels
let timer;
document.getElementById("search").addEventListener("input", e=>{
    const q = e.target.value.trim();
    clearTimeout(timer);
    if(q.length < 2) {
        document.getElementById("suggestions").innerHTML = "";
        return;
    }
    timer = setTimeout(()=>search(q), 400);
});

// Nouvelle API de recherche (v4)
async function search(q){
    try {
        const url = `https://financialmodelingprep.com/api/v4/search-ticker?query=${encodeURIComponent(q)}&limit=7&apikey=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        renderSuggestions(data);
    } catch(e) {
        console.log("Erreur recherche", e);
    }
}

// Afficher suggestions
function renderSuggestions(list){
    const box = document.getElementById("suggestions");
    box.innerHTML = "";
    if(!Array.isArray(list) || list.length===0) return;
    list.forEach(s => {
        const div = document.createElement("div");
        div.className = "sug";
        div.textContent = `${s.symbol} — ${s.name}`;
        div.onclick = ()=> loadQuote(s.symbol);
        box.appendChild(div);
    });
}

// Charger le quote (v4 short)
async function loadQuote(symbol){
    document.getElementById("suggestions").innerHTML = "";
    try {
        const res = await fetch(`https://financialmodelingprep.com/api/v4/quote-short/${symbol}?apikey=${API_KEY}`);
        const data = await res.json();
        if (!Array.isArray(data) || !data[0]) {
          document.getElementById("result").innerHTML = "Données indisponibles";
          return;
        }
        const d = data[0];
        document.getElementById("result").innerHTML = `
          <div class="card">
            <h3>${d.symbol}</h3>
            <div style="font-size:28px;margin-top:10px;">${d.price} USD</div>
          </div>`;
    } catch(e) {
        console.log("Erreur quote", e);
        document.getElementById("result").innerHTML = "Données indisponibles";
    }
}
</script>

</body>
</html>
