<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0d; --surface:#0f1318; --surface2:#141921; --border:#1c2330; --border2:#232e3d;
  --text:#dde6f0; --muted:#4a5a6e; --green:#2dd4a0; --red:#f06b6b; --accent:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,160,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:48px 20px 60px;}
.setup-screen,.main-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:fadeUp 0.5s ease;}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--green);text-transform:uppercase;margin-bottom:16px;}
.setup-title{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--text);margin-bottom:8px;letter-spacing:-1px;}
.setup-sub{font-size:14px;color:var(--muted);margin-bottom:40px;font-weight:300;}
.setup-field{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:16px 20px;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);outline:none;text-align:center;letter-spacing:1px;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:12px;}
.setup-field::placeholder{color:var(--muted);letter-spacing:0.5px;}
.setup-field:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,212,160,0.08);}
.setup-btn{width:100%;max-width:380px;background:var(--green);border:none;border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#050a07;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s,transform 0.1s;}
.setup-btn:active{transform:scale(0.98);opacity:0.9;}
.setup-note{font-size:11px;color:var(--muted);margin-top:20px;font-family:'DM Mono',monospace;letter-spacing:0.5px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.topbar-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--green);text-transform:uppercase;}
.key-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
.key-btn:hover{border-color:var(--border2);color:var(--text);}
.search-wrap{position:relative;margin-bottom:8px;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:18px 56px 18px 20px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,212,160,0.07);}
.search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--green);font-size:20px;pointer-events:none;}
.suggestions{background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:20px;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.sug-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;}
.sug-item:last-child{border-bottom:none;}
.sug-item:active{background:var(--surface2);}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;overflow:hidden;animation:fadeUp 0.35s ease;margin-bottom:20px;}
.card-header{padding:24px 24px 20px;border-bottom:1px solid var(--border);position:relative;}
.card-ticker{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--text);}
.card-price-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:10px;}
.card-price{font-family:'DM Mono',monospace;font-size:38px;font-weight:500;}
.badge{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;padding:6px 14px;border-radius:8px;letter-spacing:0.5px;}
.badge-up{background:rgba(45,212,160,0.12);color:var(--green);border:1px solid rgba(45,212,160,0.2);}
.badge-down{background:rgba(240,107,107,0.1);color:var(--red);border:1px solid rgba(240,107,107,0.2);}
.card-footer{padding:16px 20px;}
.state{padding:60px 20px;text-align:center;color:var(--muted);}
.state-icon{font-size:36px;margin-bottom:16px;}
.hidden{display:none !important;}
canvas{width:100%;height:80px;margin-top:10px;border-radius:6px;}
</style>
</head>
<body>
<div class="app">

  <!-- SETUP SCREEN -->
  <div class="setup-screen" id="setupScreen">
    <div class="logo">Market Terminal</div>
    <div class="setup-title">Stock Search</div>
    <div class="setup-sub">Entrez votre clé API pour commencer</div>
    <input class="setup-field" type="password" id="keyInput" placeholder="Clé API FMP" autocomplete="off"/>
    <button class="setup-btn" onclick="activateKey()">Activer →</button>
    <div class="setup-note">Clé stockée localement · Non transmise<br/>financialmodelingprep.com</div>
  </div>

  <!-- MAIN SCREEN -->
  <div class="main-screen hidden" id="mainScreen">
    <div class="topbar">
      <div class="topbar-logo">Market Terminal</div>
      <button class="key-btn" onclick="resetKey()">⚙ Clé API</button>
    </div>

    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="Apple, AAPL..." autocomplete="off"/>
      <div class="search-icon">⌕</div>
    </div>
    <div class="suggestions hidden" id="suggestions"></div>
    <div id="resultArea">
      <div class="state"><div class="state-icon">◎</div>Rechercher par nom ou ticker</div>
    </div>
  </div>
</div>

<!-- Chart.js pour mini-graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let API_KEY = localStorage.getItem("fmp_key") || "";
if(API_KEY) showMain();

document.getElementById("keyInput").addEventListener("keydown",e=>{if(e.key==="Enter") activateKey();});

function activateKey(){
  const val = document.getElementById("keyInput").value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem("fmp_key",val);
  showMain();
}

function resetKey(){
  localStorage.removeItem("fmp_key");
  API_KEY="";
  document.getElementById("keyInput").value="";
  document.getElementById("mainScreen").classList.add("hidden");
  document.getElementById("setupScreen").classList.remove("hidden");
}

function showMain(){
  document.getElementById("setupScreen").classList.add("hidden");
  document.getElementById("mainScreen").classList.remove("hidden");
  document.getElementById("searchInput").focus();
}

// RECHERCHE
let debounceTimer=null;
document.getElementById("searchInput").addEventListener("input", e=>{
  const q = e.target.value.trim();
  clearTimeout(debounceTimer);
  hideSuggestions();
  if(q.length<2) return;
  debounceTimer=setTimeout(()=>doSearch(q),350);
});

async function doSearch(q){
  try{
    const res=await fetch(`https://financialmodelingprep.com/stable/search-symbol?query=${encodeURIComponent(q)}&apikey=${API_KEY}`);
    const data=await res.json();
    if(!Array.isArray(data)||data.length===0){hideSuggestions(); return;}
    renderSuggestions(data.slice(0,7));
  }catch(e){hideSuggestions();}
}

function renderSuggestions(items){
  const box=document.getElementById("suggestions");
  box.innerHTML=items.map(s=>`
    <div class="sug-item" onclick="loadQuote('${s.symbol}')">
      <div class="sug-ticker">${s.symbol}</div>
      <div class="sug-info"><div class="sug-name">${s.name||'—'}</div></div>
    </div>`).join("");
  box.classList.remove("hidden");
}

function hideSuggestions(){document.getElementById("suggestions").classList.add("hidden");}

// LOAD QUOTE + mini-chart
async function loadQuote(symbol){
  hideSuggestions();
  document.getElementById("searchInput").value=symbol;
  setResult(`<div class="state"><div class="state-icon">◎</div>Chargement...</div>`);

  try{
    const resQuote=await fetch(`https://financialmodelingprep.com/api/v4/quote-short/${symbol}?apikey=${API_KEY}`);
    const dataQuote=await resQuote.json();
    if(!Array.isArray(dataQuote)||!dataQuote[0]){setResult('Données indisponibles'); return;}
    const price=dataQuote[0].price;

    // données historiques mini-graph
    const resHist=await fetch(`https://financialmodelingprep.com/api/v3/historical-price-full/${symbol}?timeseries=10&apikey=${API_KEY}`);
    const dataHist=await resHist.json();
    const hist=(dataHist.historical||[]).reverse().map(d=>d.close);

    setResult(`
      <div class="card">
        <div class="card-ticker">${symbol}</div>
        <div class="card-price-row">
          <div class="card-price">${price.toFixed(2)} USD</div>
        </div>
        <canvas id="sparkline"></canvas>
      </div>`);

    const ctx=document.getElementById('sparkline').getContext('2d');
    new Chart(ctx,{
      type:'line',
      data:{
        labels:hist.map((_,i)=>i),
        datasets:[{data:hist,borderColor:price>=hist[0]?'#2dd4a0':'#f06b6b',fill:false,tension:0.3}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
    });

  }catch(e){setResult('Erreur chargement');}
}

function setResult(html){document.getElementById("resultArea").innerHTML=html;}
</script>
</body>
</html>
